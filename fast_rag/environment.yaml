name: fastapi_rag
channels:
    - pytorch 
    - nvidia # Mac은 주석
    - conda-forge 
    - defaults
dependencies:
    - python=3.12
    - pytorch
    - pytorch-cuda=12.4 # Mac은 주석
    - numpy
    - pandas
    - matplotlib
    - seaborn
    - scikit-learn
    - sqlalchemy>=2.0.30
    - bcrypt
    - beautifulsoup4
    - jupyterlab
    - pydantic>=2.7.4
    - python-dotenv=1.0.1
    - pip

    - pip:
        - asyncio
        - aioboto3
        - anthropic
        - git+https://github.com/HKUDS/RAG-Anything.git
        - lightrag-hku==1.4.16
        - docling
        - pymupdf
        - opencv-python-headless
        - pypdf
        - fastapi==0.115.12                
        - uvicorn==0.30.1
        - python-multipart
        - pyjwt
        - pgvector
        - passlib[bcrypt]
        - pillow
        - chromadb
        - langdetect
        - openai
        - ollama>=0.6.0,<0.7.0
        - redis
        - asyncpg
        - sentence-transformers
        - python-jose[cryptography]
        - psycopg2-binary
        - langchain-postgres>=0.0.3
        - langchain==1.2.6
        - langchain-community==0.4.1
        - langchain-core==1.2.7
        - langchain-openai==1.1.7
        - langchain-anthropic==1.3.1
        - langchain-huggingface==1.2.0
        - langchain-text-splitters==1.1.0
        - langchain-unstructured==1.0.1
        - langgraph==1.0.6
        - langsmith==0.6.4
        - langchain-ollama==1.0.1